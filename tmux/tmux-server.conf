set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "tmux-256color"

set-option -g prefix C-b
bind-key C-b send-prefix

# Start window and pane number at 1 (instead of 0)
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase history
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# Reduce escape time (for vim)
set -sg escape-time 0

# Enable focus events (for vim)
set -g focus-events on

# Split windows more intuitively
bind | split-window -h -c "#{pane_current_path}"  # Vertical split
bind - split-window -v -c "#{pane_current_path}"  # Horizontal split

# Pane navigation (vim-style)
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Join and send pane
bind-key @ command-prompt -p "Join pane from:" "join-pane -s :'%%'"
bind-key s command-prompt -p "Send pane to:" "join-pane -t :'%%'"

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode bindings (no wl-copy — yanks to tmux buffer, use local terminal selection for clipboard)
set-window-option -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# Tmux Plugin Manager
set -g @plugin "tmux-plugins/tpm"

# Selected Plugins
set -g @plugin "catppuccin/tmux"

# Configure the catppuccin plugin (frappe to visually distinguish server sessions)
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.config/tmux/plugins/tpm/tpm"
